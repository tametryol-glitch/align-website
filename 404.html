<!--
  Align share-link landing page.

  Upload this file to the `align-website` GitHub Pages repo as `404.html`
  at the repo root. GitHub Pages serves it for any path it can't otherwise
  resolve, so a URL like

    https://tametryol-glitch.github.io/align-website/r/abc123

  triggers this page. The page reads its own path, shows a lightweight
  preview, and tries to hand off to the installed app. If the app isn't
  installed (no scheme handler picks up the URL within a short timeout),
  the page sends the visitor to the Play Store.

  Routes handled:
    /r/<id>  — reel
    /p/<id>  — feed post
    /u/<id>  — user profile
    /c/<id>  — saved chart
    /g/<id>  — community

  Unknown paths show the generic install-the-app CTA.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Align</title>
  <meta name="theme-color" content="#0A0E1A" />
  <meta property="og:site_name" content="Align" />
  <meta property="og:title" content="Align — Astrology & Insight" />
  <meta property="og:description" content="Your cosmic blueprint. Daily insights, charts, and AI readings." />
  <meta property="og:type" content="website" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: radial-gradient(ellipse at top, #1a0d38 0%, #0A0E1A 70%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      min-height: 100%;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(155,111,246,0.28);
      border-radius: 20px;
      padding: 36px 24px;
      backdrop-filter: blur(16px);
    }
    .brand {
      font-size: 42px;
      letter-spacing: 0.5px;
      font-weight: 800;
      background: linear-gradient(135deg, #B8A0FA 0%, #9B6FF6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
    }
    .tagline {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .kind {
      font-size: 14px;
      color: #D0C5FD;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .heading {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 18px;
    }
    .btn {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-decoration: none;
      margin-top: 8px;
      min-width: 200px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #9B6FF6 0%, #7C3AED 100%);
      color: #fff;
      box-shadow: 0 4px 18px rgba(124,58,237,0.35);
    }
    .btn-primary:active { transform: translateY(1px); }
    .btn-secondary {
      color: #B8A0FA;
      border: 1px solid rgba(155,111,246,0.4);
      margin-top: 10px;
    }
    .row { margin-top: 16px; }
    .footer {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      margin-top: 20px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(155,111,246,0.3);
      border-top-color: #B8A0FA;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      margin: 16px 0 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Align</div>
    <div class="tagline">Your cosmic blueprint</div>

    <div id="kind" class="kind"></div>
    <div id="heading" class="heading">Opening Align…</div>

    <div class="hint"><span class="spinner"></span><span id="status">Trying to open the app…</span></div>

    <a id="playBtn" class="btn btn-primary"
       href="https://play.google.com/store/apps/details?id=com.align.astrology">
       Get Align on Google Play
    </a>

    <div class="row">
      <a id="openBtn" class="btn btn-secondary" href="#">Open in app</a>
    </div>

    <div class="footer">
      Don't have the app? Tap <strong>Get Align</strong> — the store will pick up from where you clicked after you install.
    </div>
  </div>

  <script>
    (function () {
      // ── Parse route + id from path ────────────────────────────────────
      // GitHub Pages project pages serve from /<repo>/…, so the prefix here
      // is /align-website. Strip it before matching.
      var PREFIX = '/align-website';
      var fullPath = window.location.pathname || '/';
      var path = fullPath.indexOf(PREFIX) === 0 ? fullPath.slice(PREFIX.length) : fullPath;
      // Examples now: "/r/abc123", "/u/xyz", "/" (invite-only)

      var SCHEME = 'align';
      var STORE = 'https://play.google.com/store/apps/details?id=com.align.astrology';

      var KINDS = {
        r: { label: 'Reel',     heading: 'A reel someone shared with you' },
        p: { label: 'Post',     heading: 'A post someone shared with you' },
        u: { label: 'Profile',  heading: 'Someone wants to connect on Align' },
        c: { label: 'Chart',    heading: 'A birth chart shared on Align'   },
        g: { label: 'Community',heading: 'Join this community on Align'    }
      };

      var match = path.match(/^\/([rpucg])\/([^/?#]+)/);
      var kindLabel = '', heading = 'Open in Align to continue', schemeUrl = SCHEME + '://';

      if (match) {
        var kind = match[1];
        var id = match[2];
        var info = KINDS[kind];
        if (info) {
          kindLabel = info.label;
          heading = info.heading;
        }
        schemeUrl = SCHEME + ':/' + kind + '/' + encodeURIComponent(id);
      }

      document.getElementById('kind').textContent = kindLabel;
      document.getElementById('heading').textContent = heading;

      var openBtn = document.getElementById('openBtn');
      openBtn.href = schemeUrl;

      // ── Attempt deep-link handoff ─────────────────────────────────────
      // Strategy: set an iframe src to the scheme URL (this is the pattern
      // most reliable across Android browsers). If the app is installed the
      // OS takes over and our page is backgrounded. If not, we fall through
      // to the Play Store after a short timeout.
      var triedHandoff = false;
      function tryOpenApp() {
        if (triedHandoff) return;
        triedHandoff = true;
        try {
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = schemeUrl;
          document.body.appendChild(iframe);
        } catch (_) {}
        // Also navigate directly (iOS Safari ignores the iframe trick)
        window.location.href = schemeUrl;
      }

      // Kick off handoff immediately
      tryOpenApp();

      // If we're still here after 1.3s, the app isn't installed.
      setTimeout(function () {
        document.getElementById('status').textContent = "Looks like you don't have Align yet.";
      }, 1300);

      // Auto-redirect to Play Store for Android users after 2.5s if they
      // haven't tapped anything. iOS users see the button (App Store link
      // can be swapped in when Apple account is ready).
      var ua = navigator.userAgent || '';
      if (/android/i.test(ua)) {
        setTimeout(function () {
          if (!document.hidden) {
            window.location.href = STORE;
          }
        }, 2500);
      }

      // If the page becomes visible again (user came back from an app
      // picker dialog without opening Align), offer the store button.
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
          document.getElementById('status').textContent = "Didn't open? Grab the app:";
        }
      });
    })();
  </script>
</body>
</html>
